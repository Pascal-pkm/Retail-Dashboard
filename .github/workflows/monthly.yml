name: Monatlicher KPI-Lauf

on:
  schedule:
    - cron: "23 7 5 * *"   # am 5. jedes Monats (GENESIS/Eurostat-Veröffentlichungen abwarten)
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Daten abrufen (monatlich)
        env:
          GENESIS_USER: ${{ secrets.GENESIS_USER }}
          GENESIS_PASS: ${{ secrets.GENESIS_PASS }}
        run: python scripts/run_update.py monthly

      - name: data.json committen
        env:
          GENESIS_USER: ${{ secrets.GENESIS_USER }}
          GENESIS_PASS: ${{ secrets.GENESIS_PASS }}
        run: |
          git config user.name "kpi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && { echo "Keine Aenderungen."; exit 0; }
          git commit -m "Daten-Update (monatlich) $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push erfolgreich (Versuch $i)."
              exit 0
            fi
            echo "Push abgelehnt (Versuch $i) - vermutlich ein anderer Workflow war schneller. Hole Remote-Stand und rebase..."
            git fetch origin main
            if git rebase origin/main; then
              continue
            fi
            echo "Rebase-Konflikt in docs/data.json - baue das Update stattdessen frisch auf dem aktuellen Remote-Stand neu auf."
            git rebase --abort
            git reset --hard origin/main
            python scripts/run_update.py monthly
            git add docs/data.json
            git diff --cached --quiet && { echo "Keine Aenderungen nach Neuaufbau."; exit 0; }
            git commit -m "Daten-Update (monatlich) $(date -u +%F)"
            sleep $((RANDOM % 6 + 2))
          done
          echo "Push nach mehreren Versuchen fehlgeschlagen."
          exit 1

      # Hinweis: Der Newsletter-Versand laeuft NICHT mehr hier, sondern in einem
      # eigenen Workflow (newsletter.yml), damit er unabhaengig vom Zeitpunkt
      # dieses Datenlaufs immer um 10:00 Uhr Berliner Zeit verschickt wird.
