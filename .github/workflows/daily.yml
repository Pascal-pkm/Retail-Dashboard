name: Täglicher KPI-Lauf

on:
  schedule:
    - cron: "23 5 * * *"   # 05:23 UTC = 06:23/07:23 DE
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Daten abrufen (täglich - Google Trends, Aktien, Radverkehr-Zählstellen; Hystreet läuft separat & manuell)
        run: python scripts/run_update.py daily

      - name: data.json committen
        run: |
          git config user.name "kpi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "Daten-Update (täglich) $(date -u +%F)"
          git push

      - name: Newsletter versenden
        if: vars.NEWSLETTER_ENABLED == 'true'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
        run: python scripts/newsletter.py daily
