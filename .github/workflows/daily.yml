name: Täglicher KPI-Lauf

on:
  schedule:
    - cron: "23 5 * * *"   # 05:23 UTC = 06:23/07:23 DE
  workflow_dispatch:
    inputs:
      stocks_backfill_period:
        description: "Nur fuer einmaligen Backfill: yfinance-period fuer Aktienkurse (z.B. 2y, 5y, max). Leer lassen fuer normales Update (nur letzte 10 Handelstage)."
        type: string
        default: ""
      gtrends_backfill_timeframe:
        description: "Nur fuer einmaligen Backfill: pytrends-timeframe fuer Google Trends (z.B. 'today 5-y'). Leer lassen fuer normales Update (nur letzte 30 Tage aus dem 3-Monats-Fenster)."
        type: string
        default: ""

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Daten abrufen (täglich - Google Trends, Aktien, Radverkehr-Zählstellen; Hystreet läuft separat & manuell)
        env:
          STOCKS_BACKFILL_PERIOD: ${{ inputs.stocks_backfill_period }}
          GTRENDS_BACKFILL_TIMEFRAME: ${{ inputs.gtrends_backfill_timeframe }}
        run: python scripts/run_update.py daily

      - name: data.json committen
        env:
          STOCKS_BACKFILL_PERIOD: ${{ inputs.stocks_backfill_period }}
          GTRENDS_BACKFILL_TIMEFRAME: ${{ inputs.gtrends_backfill_timeframe }}
        run: |
          git config user.name "kpi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && { echo "Keine Aenderungen."; exit 0; }
          git commit -m "Daten-Update (täglich) $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push erfolgreich (Versuch $i)."
              exit 0
            fi
            echo "Push abgelehnt (Versuch $i) - vermutlich ein anderer Workflow war schneller. Hole Remote-Stand und rebase..."
            git fetch origin main
            if git rebase origin/main; then
              continue
            fi
            echo "Rebase-Konflikt in docs/data.json - baue das Update stattdessen frisch auf dem aktuellen Remote-Stand neu auf."
            git rebase --abort
            git reset --hard origin/main
            python scripts/run_update.py daily
            git add docs/data.json
            git diff --cached --quiet && { echo "Keine Aenderungen nach Neuaufbau."; exit 0; }
            git commit -m "Daten-Update (täglich) $(date -u +%F)"
            sleep $((RANDOM % 6 + 2))
          done
          echo "Push nach mehreren Versuchen fehlgeschlagen."
          exit 1

      - name: Newsletter versenden
        if: vars.NEWSLETTER_ENABLED == 'true'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
        run: python scripts/newsletter.py daily
