name: Wöchentlicher KPI-Lauf

on:
  schedule:
    - cron: "23 6 * * 1"   # montags 06:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Daten abrufen (wöchentlich)
        run: python scripts/run_update.py weekly

      - name: data.json committen
        run: |
          git config user.name "kpi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "Daten-Update (wöchentlich) $(date -u +%F)"
          git push

      - name: Newsletter versenden
        if: vars.NEWSLETTER_ENABLED == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ vars.NEWSLETTER_FROM }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
        run: python scripts/newsletter.py weekly
