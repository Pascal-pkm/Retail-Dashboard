name: Hystreet manuell (Passantenfrequenzen)

# BEWUSST KEIN "schedule:" - dieser Workflow läuft ausschließlich, wenn du ihn
# manuell über "Run workflow" (Actions-Tab) anstößt. Hintergrund in COMPLIANCE.md:
# die hystreet-AGB stehen einem automatisierten Dauerbetrieb entgegen; die
# Entscheidung, wann/ob abgefragt wird, bleibt dadurch bei dir.
on:
  workflow_dispatch:
    inputs:
      backfill_from:
        description: "Nur fuer einmaligen Backfill: Datum ab dem Historie nachgeladen wird (YYYY-MM-DD, z.B. 2024-01-01). Leer lassen fuer normales Update (nur letzte 8 Tage)."
        type: string
        default: ""
      newsletter:
        description: "Nach dem Abruf auch den (privaten) Newsletter versenden?"
        type: boolean
        default: false

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"   # Python-Ausgaben sofort in den Actions-Logs sichtbar, nicht erst am Ende gepuffert

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Hystreet-Daten abrufen
        env:
          HYSTREET_API_KEY: ${{ secrets.HYSTREET_API_KEY }}
          HYSTREET_BACKFILL_FROM: ${{ inputs.backfill_from }}
        run: python scripts/run_hystreet.py

      - name: data.json committen
        env:
          HYSTREET_API_KEY: ${{ secrets.HYSTREET_API_KEY }}
          HYSTREET_BACKFILL_FROM: ${{ inputs.backfill_from }}
        run: |
          git config user.name "kpi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && { echo "Keine Aenderungen."; exit 0; }
          git commit -m "Hystreet-Update (manuell${{ inputs.backfill_from && format(', Backfill ab {0}', inputs.backfill_from) || '' }}) $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push erfolgreich (Versuch $i)."
              exit 0
            fi
            echo "Push abgelehnt (Versuch $i) - vermutlich ein anderer Workflow war schneller. Hole Remote-Stand und rebase..."
            git fetch origin main
            if git rebase origin/main; then
              continue
            fi
            echo "Rebase-Konflikt in docs/data.json - baue das Update stattdessen frisch auf dem aktuellen Remote-Stand neu auf."
            git rebase --abort
            git reset --hard origin/main
            python scripts/run_hystreet.py
            git add docs/data.json
            git diff --cached --quiet && { echo "Keine Aenderungen nach Neuaufbau."; exit 0; }
            git commit -m "Hystreet-Update (manuell${{ inputs.backfill_from && format(', Backfill ab {0}', inputs.backfill_from) || '' }}) $(date -u +%F)"
            sleep $((RANDOM % 6 + 2))
          done
          echo "Push nach mehreren Versuchen fehlgeschlagen."
          exit 1

      - name: Newsletter versenden (privat, nur an dich)
        if: ${{ inputs.newsletter && vars.NEWSLETTER_ENABLED == 'true' }}
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
        run: python scripts/newsletter.py daily
